<!DOCTYPE html>
<html>
  <head>
    <title>Asterix Emergency Dispatch Dashboard</title>
    <!-- YOUR API KEY IS INSERTED BELOW -->
    <script src="https://googleapis.com" async defer></script>
    
    <style>
      #map { height: 100vh; width: 100%; }
      body { margin: 0; padding: 0; }
      #dispatch-panel { 
        position: absolute; top: 20px; left: 20px; z-index: 5; 
        background: white; padding: 20px; border-radius: 10px; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-family: Arial, sans-serif;
      }
      h2 { margin-top: 0; color: #d32f2f; } /* Fire Red */
    </style>
  </head>
  <body>
    <div id="dispatch-panel">
        <h2>ASTERIX DISPATCH</h2>
        <p>Enter Scene Address:</p>
        <input id="pac-input" type="text" placeholder="Search for location..." style="width: 300px; padding: 10px; border: 1px solid #ccc;">
        <div id="status" style="margin-top: 15px; color: green; font-weight: bold;">● LIVE TRAFFIC ACTIVE</div>
    </div>
    <div id="map"></div>

    <script>
      function initMap() {
        // Center map on South Africa (adjust these coordinates for your specific town)
        const myTown = { lat: -25.7479, lng: 28.2293 }; 
        
        const map = new google.maps.Map(document.getElementById("map"), {
          center: myTown,
          zoom: 14,
          mapTypeControl: true,
          streetViewControl: false
        });

        // ACTIVATE LIVE TRAFFIC LAYER
        const trafficLayer = new google.maps.TrafficLayer();
        trafficLayer.setMap(map);

        // ACTIVATE SEARCH BOX
        const input = document.getElementById("pac-input");
        const autocomplete = new google.maps.places.Autocomplete(input);
        autocomplete.bindTo("bounds", map);

        autocomplete.addListener("place_changed", () => {
          const place = autocomplete.getPlace();
          if (!place.geometry) return;
          
          map.setCenter(place.geometry.location);
          map.setZoom(17);
          
          new google.maps.Marker({
            position: place.geometry.location,
            map: map,
            title: "EMERGENCY SCENE",
            animation: google.maps.Animation.BOUNCE
          });
        });
      }
    </script>
  </body>
</html>
